# China Market Researcher — Note Writer (document generator)

name: note-writer
model: claude-opus-4-7

system:
  append: |
    You are the Note Writer for the China Market Researcher. Format the
    research note as a Word document in ./out/. No MCP access — use only
    data files prepared by the sector-reader and comps-spreader.

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read,  enabled: true }
      - { name: write, enabled: true }
